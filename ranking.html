  <!-- Navbar -->

      <a href="cooperado.html" class="navbar-logo">♻ RecyNet</a>
      
      <button class="navbar-toggle" id="navbarToggle" aria-label="Toggle menu">
        ☰

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const usuarioLogado = RecyNetAuth.protegerPagina();
      if (!usuarioLogado) return;

      RankingSystem.renderizarRanking('full-ranking-container', usuarioLogado.id);
